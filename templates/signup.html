{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="icon" href="{% static 'img/icon.png' %}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #050a1a;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Poppins', sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            padding: 30px 16px;
        }

        #particles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-1 {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,120,255,0.18) 0%, transparent 70%);
            top: -150px; left: -150px;
            pointer-events: none;
            z-index: 0;
            animation: driftA 8s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(120,0,255,0.15) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            pointer-events: none;
            z-index: 0;
            animation: driftB 10s ease-in-out infinite alternate;
        }
        @keyframes driftA { from{transform:translate(0,0)} to{transform:translate(60px,40px)} }
        @keyframes driftB { from{transform:translate(0,0)} to{transform:translate(-40px,-60px)} }

        .card-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            animation: floatCard 6s ease-in-out infinite;
        }
        @keyframes floatCard {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .signup-form {
            position: relative;
            background: rgba(10,18,40,0.90);
            padding: 28px 32px 24px;
            border-radius: 20px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(0,150,255,0.25);
            box-shadow:
                0 0 40px rgba(0,100,255,0.25),
                0 0 80px rgba(100,0,255,0.12),
                inset 0 1px 0 rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: box-shadow 0.2s, transform 0.1s;
        }

        .form-glow-ring {
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(0,150,255,0.5), rgba(120,0,255,0.5), rgba(0,150,255,0.5));
            background-size: 200% 200%;
            animation: ringRotate 4s linear infinite;
            z-index: -1;
            pointer-events: none;
            opacity: 0.75;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 2px;
        }
        @keyframes ringRotate {
            0%  {background-position:0% 50%}
            50% {background-position:100% 50%}
            100%{background-position:0% 50%}
        }

        .nova-logo {
            font-size: 12px;
            letter-spacing: 6px;
            color: rgba(0,180,255,0.75);
            text-transform: uppercase;
            margin-bottom: 2px;
            font-weight: 300;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(0,150,255,0.5), 0 0 40px rgba(0,100,255,0.3);
        }

        /* Two-column name row */
        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 0;
        }

        /* Input groups */
        .input-wrap {
            position: relative;
            margin: 7px 0;
        }

        .input-wrap input {
            display: block;
            width: 100%;
            padding: 10px 14px 10px 40px;
            border-radius: 10px;
            border: 1px solid rgba(0,150,255,0.25);
            background: rgba(255,255,255,0.06);
            color: #e0eeff;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: text;
            position: relative;
            z-index: 2;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
        }
        .input-wrap input::placeholder { color: rgba(180,200,255,0.4); }
        .input-wrap input:focus {
            border-color: rgba(0,160,255,0.8);
            background: rgba(0,100,255,0.08);
            box-shadow: 0 0 0 3px rgba(0,120,255,0.15), 0 0 16px rgba(0,120,255,0.18);
        }

        /* Name inputs — no icon so no left padding shift */
        .name-row .input-wrap input {
            padding-left: 14px;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0,150,255,0.6);
            font-size: 16px;
            pointer-events: none;
            z-index: 3;
        }

        /* Strength message */
        #pass-msg {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-align: left;
            margin: 4px 2px 8px;
            min-height: 16px;
            transition: color 0.3s;
            color: rgba(180,200,255,0.45);
        }

        /* Toggle switch */
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 9px;
            color: rgba(180,200,255,0.75);
            cursor: pointer;
            user-select: none;
            margin-bottom: 14px;
            font-size: 12px;
        }
        .toggle-switch input { display: none; }
        .toggle-switch label {
            position: relative;
            display: inline-block;
            width: 40px; height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
            margin: 0;
            border: 1px solid rgba(0,150,255,0.25);
            flex-shrink: 0;
        }
        .toggle-switch label::after {
            content: "";
            position: absolute;
            width: 14px; height: 14px;
            left: 3px; top: 3px;
            background: rgba(180,200,255,0.6);
            border-radius: 50%;
            transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
        }
        .toggle-switch input:checked + label {
            background: rgba(0,100,255,0.35);
            border-color: rgba(0,190,255,0.7);
            box-shadow: 0 0 10px rgba(0,150,255,0.45);
        }
        .toggle-switch input:checked + label::after {
            transform: translateX(20px);
            background: #00bfff;
            box-shadow: 0 0 8px rgba(0,200,255,0.85);
        }

        /* Submit button */
        .btn-submit {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-width: 160px;
            padding: 11px 36px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #0066ff, #0044cc);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            overflow: hidden;
            transition: background 0.3s, box-shadow 0.3s, transform 0.2s;
            box-shadow:
                0 0 18px rgba(0,100,255,0.5),
                0 0 36px rgba(0,80,255,0.22),
                0 4px 14px rgba(0,0,0,0.4);
        }
        .btn-submit::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
            border-radius: 10px;
            pointer-events: none;
        }
        .btn-submit::after {
            content: "";
            position: absolute;
            width: 60px; height: 100%;
            background: rgba(255,255,255,0.2);
            left: -80px; top: 0;
            transform: skewX(-20deg);
            transition: left 0.5s;
            pointer-events: none;
        }
        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(135deg, #0080ff, #0055ee);
            box-shadow:
                0 0 28px rgba(0,140,255,0.75),
                0 0 55px rgba(0,100,255,0.32),
                0 6px 18px rgba(0,0,0,0.5);
            transform: translateY(-3px) scale(1.03);
        }
        .btn-submit:hover:not(:disabled)::after { left: 130%; }
        .btn-submit:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
        .btn-submit:disabled {
            background: linear-gradient(135deg, #1e2d4a, #141e33);
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,150,255,0.25), transparent);
            margin: 14px 0;
        }

        .links {
            font-size: 13px;
            color: rgba(180,200,255,0.55);
            padding-bottom: 2px;
        }
        .links a {
            color: rgba(0,195,255,0.9);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            text-shadow: 0 0 8px rgba(0,180,255,0.3);
            transition: color 0.2s, text-shadow 0.2s;
        }
        .links a:hover {
            color: #00d4ff;
            text-shadow: 0 0 14px rgba(0,220,255,0.8);
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 20px 12px; }
            .signup-form { padding: 22px 18px 20px; }
            .btn-submit { width: 100%; }
        }
        @media (max-width: 360px) {
            .name-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="card-wrap" id="cardWrap">
    <div class="signup-form" id="signinCard">
        <div class="form-glow-ring"></div>

        <form id="signupForm" method="POST" action="{% url 'signup' %}">
            {% csrf_token %}

            <div class="nova-logo">NOVA</div>
            <h2>Create Account</h2>

            <!-- First & Last Name -->
            <div class="name-row">
                <div class="input-wrap">
                    <input type="text" name="first_name" placeholder="First Name" required autocomplete="given-name">
                </div>
                <div class="input-wrap">
                    <input type="text" name="last_name" placeholder="Last Name" required autocomplete="family-name">
                </div>
            </div>

            <!-- Username -->
            <div class="input-wrap">
                <i class="ti ti-user input-icon" aria-hidden="true"></i>
                <input type="text" name="username" placeholder="Username" required autocomplete="username">
            </div>

            <!-- Email -->
            <div class="input-wrap">
                <i class="ti ti-mail input-icon" aria-hidden="true"></i>
                <input type="email" name="email" placeholder="Email" required autocomplete="email">
            </div>

            <!-- Password -->
            <div class="input-wrap">
                <i class="ti ti-lock input-icon" aria-hidden="true"></i>
                <input type="password" name="password" id="password" placeholder="Strong Password" required autocomplete="new-password">
            </div>

            <!-- Confirm Password -->
            <div class="input-wrap">
                <i class="ti ti-lock-check input-icon" aria-hidden="true"></i>
                <input type="password" id="confirm_password" placeholder="Confirm Password" required autocomplete="new-password">
            </div>

            <!-- Strength message -->
            <span id="pass-msg">Enter a strong password</span>

            <!-- Show Passwords toggle -->
            <div class="toggle-switch">
                <input type="checkbox" id="showPass">
                <label for="showPass"></label>
                <span>Show Passwords</span>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit" disabled>
                <i class="ti ti-user-plus" aria-hidden="true"></i>
                Sign Up
            </button>

            <div class="divider"></div>

            <div class="links">
                Already have an account? <a href="{% url 'signin' %}">Sign In</a>
            </div>
        </form>
    </div>
</div>

<script>
    /* ── Particle system ── */
    var canvas = document.getElementById('particles');
    var ctx    = canvas.getContext('2d');
    var W, H, pts = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function newPt(randomY) {
        return {
            x:     Math.random() * W,
            y:     randomY ? Math.random() * H : H + 5,
            r:     Math.random() * 1.5 + 0.4,
            dx:    (Math.random() - 0.5) * 0.3,
            dy:    -(Math.random() * 0.5 + 0.15),
            alpha: Math.random() * 0.5 + 0.2,
            col:   Math.random() > 0.5 ? '0,160,255' : '120,50,255'
        };
    }

    for (var i = 0; i < 120; i++) pts.push(newPt(true));

    (function tick() {
        ctx.clearRect(0, 0, W, H);
        for (var p of pts) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle   = 'rgba(' + p.col + ',' + p.alpha + ')';
            ctx.shadowColor = 'rgba(' + p.col + ',0.9)';
            ctx.shadowBlur  = 7;
            ctx.fill();
            p.x += p.dx;
            p.y += p.dy;
            if (p.y < -5 || p.x < -5 || p.x > W + 5) Object.assign(p, newPt(false));
        }
        requestAnimationFrame(tick);
    })();

    /* ── 3D mouse tilt ── */
    var card = document.getElementById('signinCard');
    var wrap = document.getElementById('cardWrap');

    document.addEventListener('mousemove', function(e) {
        var r  = wrap.getBoundingClientRect();
        var mx = ((e.clientX - (r.left + r.width  / 2)) / r.width)  * 10;
        var my = ((e.clientY - (r.top  + r.height / 2)) / r.height) * 8;
        card.style.transform = 'rotateX(' + (-my) + 'deg) rotateY(' + mx + 'deg)';
        card.style.boxShadow =
            (-mx * 1.5) + 'px ' + my + 'px 60px rgba(0,100,255,0.3),' +
            '0 0 80px rgba(100,0,255,0.15),' +
            'inset 0 1px 0 rgba(255,255,255,0.09)';
    });

    document.addEventListener('mouseleave', function() {
        card.style.transform = '';
        card.style.boxShadow = '';
    });

    /* ── Password validation — original logic, unchanged ── */
    var password         = document.getElementById('password');
    var confirm_password = document.getElementById('confirm_password');
    var passMsg          = document.getElementById('pass-msg');
    var submitBtn        = document.getElementById('submitBtn');
    var showPass         = document.getElementById('showPass');

    showPass.addEventListener('change', function() {
        var type = showPass.checked ? 'text' : 'password';
        password.type         = type;
        confirm_password.type = type;
    });

    function validateLogic() {
        var val    = password.value;
        var confVal = confirm_password.value;

        var hasUpper     = /[A-Z]/.test(val);
        var hasLower     = /[a-z]/.test(val);
        var hasNumber    = /[0-9]/.test(val);
        var isLongEnough = val.length >= 8;

        if (!isLongEnough) {
            passMsg.style.color = '#ff5c5c';
            passMsg.innerHTML   = '✘ Min 8 characters required';
            submitBtn.disabled  = true;
        } else if (!hasUpper || !hasLower || !hasNumber) {
            passMsg.style.color = '#ffaa00';
            passMsg.innerHTML   = '⚠ Use Uppercase, Lowercase, and Numbers';
            submitBtn.disabled  = true;
        } else if (val !== confVal) {
            passMsg.style.color = '#ff5c5c';
            passMsg.innerHTML   = '✘ Passwords do not match';
            submitBtn.disabled  = true;
        } else {
            passMsg.style.color = '#00e676';
            passMsg.innerHTML   = '✔ Strong password & Matches!';
            submitBtn.disabled  = false;
        }
    }

    password.onkeyup         = validateLogic;
    confirm_password.onkeyup = validateLogic;
</script>
</body>
</html>
