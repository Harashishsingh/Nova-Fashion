{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="{% static 'img/icon.png' %}">
    <style>
        /* (Same CSS as forgot_password.html) */
        body { height: 100vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://dynamic-media-cdn.tripadvisor.com/media/photo-o/30/4e/3b/f6/caption.jpg?w=500&h=400&s=1') center/cover no-repeat; display: flex; justify-content: center; align-items: center; font-family: 'Poppins', sans-serif; }
        .form-card { background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 15px; width: 400px; text-align: center; backdrop-filter: blur(10px); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        #pass-msg { font-size: 12px; display: block; margin-bottom: 10px; font-weight: 500; }
        .btn-submit { min-width: 160px; padding: 10px 30px; border-radius: 8px; border: none; background: #007BFF; color: white; font-weight: 600; cursor: pointer; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="form-card">
        <form method="POST" action="{% url 'reset_password' %}">
            {% csrf_token %}
            <input type="hidden" name="user_id" value="{{ user_id }}">
            <h2>New Password</h2>
            <p style="font-size: 13px;">Create a strong new password.</p>
            
            <input type="password" id="password" name="password" placeholder="New Password" required>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm New Password" required>
            
            <span id="pass-msg">Must include a Capital & Number</span>

            <button type="submit" id="submitBtn" class="btn-submit" disabled>Update Password</button>
        </form>
    </div>

    <script>
        const password = document.getElementById('password');
        const confirm_password = document.getElementById('confirm_password');
        const passMsg = document.getElementById('pass-msg');
        const submitBtn = document.getElementById('submitBtn');

        function validateLogic() {
            const val = password.value;
            const hasUpper = /[A-Z]/.test(val);
            const hasNumber = /[0-9]/.test(val);
            const isLong = val.length >= 8;

            if (!isLong || !hasUpper || !hasNumber) {
                passMsg.style.color = "orange";
                passMsg.innerHTML = "⚠ Min 8 chars, 1 Capital, 1 Number";
                submitBtn.disabled = true;
            } else if (val !== confirm_password.value) {
                passMsg.style.color = "red";
                passMsg.innerHTML = "✘ Passwords do not match";
                submitBtn.disabled = true;
            } else {
                passMsg.style.color = "green";
                passMsg.innerHTML = "✔ Strong & Matches!";
                submitBtn.disabled = false;
            }
        }

        password.onkeyup = validateLogic;
        confirm_password.onkeyup = validateLogic;
    </script>
</body>
</html>
