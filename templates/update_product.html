{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Update Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" href="{% static 'img/icon.png' %}">

<style>
body { background: #f5f5f5; }

.container-box {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}
</style>

</head>
<body>

<div class="container-box">

<h3>Update Product</h3>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="row g-3">

<div class="col-md-6">
<input type="text" name="name" class="form-control" value="{{ product.name }}" required>
</div>

<div class="col-md-3">
<input type="number" name="price" class="form-control" value="{{ product.price }}" required>
</div>

<div class="col-md-3">
<input type="number" name="stock" class="form-control" value="{{ product.stock }}">
</div>

<div class="col-md-4">
<select name="category" class="form-control">
<option value="Men" {% if product.category == "Men" %}selected{% endif %}>Men</option>
<option value="Women" {% if product.category == "Women" %}selected{% endif %}>Women</option>
<option value="Kids" {% if product.category == "Kids" %}selected{% endif %}>Kids</option>
</select>
</div>

<div class="col-md-4">
<select name="subcategory" class="form-control">
<option value="Tshirt" {% if product.subcategory == "Tshirt" %}selected{% endif %}>Tshirt</option>
<option value="Shirt" {% if product.subcategory == "Shirt" %}selected{% endif %}>Shirt</option>
<option value="Jeans" {% if product.subcategory == "Jeans" %}selected{% endif %}>Jeans</option>
<option value="Watches" {% if product.subcategory == "Watches" %}selected{% endif %}>Watches</option>
<option value="Perfumes" {% if product.subcategory == "Perfumes" %}selected{% endif %}>Perfumes</option>
<option value="Hats" {% if product.subcategory == "Hats" %}selected{% endif %}>Hats</option>

<option value="Dresses" {% if product.subcategory == "Dresses" %}selected{% endif %}>Dresses</option>
<option value="Tops" {% if product.subcategory == "Tops" %}selected{% endif %}>Tops</option>
<option value="Heels" {% if product.subcategory == "Heels" %}selected{% endif %}>Heels</option>
<option value="Bags" {% if product.subcategory == "Bags" %}selected{% endif %}>Bags</option>
<option value="Jewellery" {% if product.subcategory == "Jewellery" %}selected{% endif %}>Jewellery</option>

<option value="Kidswear" {% if product.subcategory == "Kidswear" %}selected{% endif %}>Kidswear</option>
<option value="Toys" {% if product.subcategory == "Toys" %}selected{% endif %}>Toys</option>
<option value="Shoes" {% if product.subcategory == "Shoes" %}selected{% endif %}>Shoes</option>
</select>
</div>

<div class="col-md-4">
<input type="file" name="image" class="form-control">
</div>

</div>

<textarea name="description" class="form-control mt-3">{{ product.description }}</textarea>

<!-- 🔥 SIZE SECTION -->
<h5 class="mt-3">Sizes & Prices</h5>

<div id="size-container">

{% for s in sizes %}
<div class="d-flex gap-2 mb-2">
<select name="size[]" class="form-control">
<option value="XS" {% if s.size == "XS" %}selected{% endif %}>XS</option>
<option value="S" {% if s.size == "S" %}selected{% endif %}>S</option>
<option value="M" {% if s.size == "M" %}selected{% endif %}>M</option>
<option value="L" {% if s.size == "L" %}selected{% endif %}>L</option>
<option value="XL" {% if s.size == "XL" %}selected{% endif %}>XL</option>
<option value="XXL" {% if s.size == "XXL" %}selected{% endif %}>XXL</option>
</select>

<input type="number" name="size_price[]" value="{{ s.price }}" class="form-control">
</div>
{% endfor %}

</div>

<button type="button" class="btn btn-secondary btn-sm mt-2" onclick="addSize()">+ Add Size</button>

<div class="mt-4">
<button type="submit" class="btn btn-success">Update Product</button>
<a href="{% url 'dashboard' %}" class="btn btn-dark">Back</a>
</div>

</form>

</div>

<script>
function addSize(){
    let html = `
    <div class="d-flex gap-2 mb-2">
        <select name="size[]" class="form-control">
            <option value="">Size</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
        </select>
        <input type="number" name="size_price[]" class="form-control" placeholder="Price ₹">
    </div>`;
    document.getElementById("size-container").insertAdjacentHTML("beforeend", html);
}
</script>

</body>
</html>
