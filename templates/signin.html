{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - NOVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="icon" href="{% static 'img/icon.png' %}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #050a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Canvas is purely visual — no pointer events */
        #particles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-1 {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,120,255,0.18) 0%, transparent 70%);
            top: -150px; left: -150px;
            pointer-events: none;
            z-index: 0;
            animation: driftA 8s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(120,0,255,0.15) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            pointer-events: none;
            z-index: 0;
            animation: driftB 10s ease-in-out infinite alternate;
        }
        @keyframes driftA { from{transform:translate(0,0)} to{transform:translate(60px,40px)} }
        @keyframes driftB { from{transform:translate(0,0)} to{transform:translate(-40px,-60px)} }

        /* Card wrapper — z-index above canvas */
        .card-wrap {
            position: relative;
            z-index: 10;
            perspective: 1200px;
            animation: floatCard 6s ease-in-out infinite;
        }
        @keyframes floatCard {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-12px); }
        }

        .signin-form {
            position: relative;
            background: rgba(10,18,40,0.88);
            padding: 44px 40px;
            border-radius: 20px;
            width: 400px;
            max-width: 92vw;
            text-align: center;
            border: 1px solid rgba(0,150,255,0.25);
            box-shadow:
                0 0 40px rgba(0,100,255,0.25),
                0 0 80px rgba(100,0,255,0.12),
                inset 0 1px 0 rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: box-shadow 0.2s, transform 0.1s;
        }

        /* Glow ring — behind card, no pointer events */
        .form-glow-ring {
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(0,150,255,0.5), rgba(120,0,255,0.5), rgba(0,150,255,0.5));
            background-size: 200% 200%;
            animation: ringRotate 4s linear infinite;
            z-index: -1;
            pointer-events: none;
            opacity: 0.75;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 2px;
        }
        @keyframes ringRotate {
            0%  {background-position:0% 50%}
            50% {background-position:100% 50%}
            100%{background-position:0% 50%}
        }

        .nova-logo {
            font-size: 13px;
            letter-spacing: 6px;
            color: rgba(0,180,255,0.75);
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 300;
        }

        h2 {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 28px;
            text-shadow: 0 0 20px rgba(0,150,255,0.5), 0 0 40px rgba(0,100,255,0.3);
        }

        /* Input groups */
        .input-wrap {
            position: relative;
            margin: 14px 0;
        }

        .input-wrap input {
            display: block;
            width: 100%;
            padding: 13px 16px 13px 44px;
            border-radius: 10px;
            border: 1px solid rgba(0,150,255,0.25);
            background: rgba(255,255,255,0.06);
            color: #e0eeff;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            cursor: text;
            position: relative;
            z-index: 2;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
        }
        .input-wrap input::placeholder { color: rgba(180,200,255,0.4); }
        .input-wrap input:focus {
            border-color: rgba(0,160,255,0.8);
            background: rgba(0,100,255,0.08);
            box-shadow: 0 0 0 3px rgba(0,120,255,0.18), 0 0 20px rgba(0,120,255,0.2);
        }

        /* Icon sits above input visually but doesn't block clicks */
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0,150,255,0.6);
            font-size: 17px;
            pointer-events: none;
            z-index: 3;
        }

        /* Toggle + Forgot row */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 0 26px;
            font-size: 13px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 9px;
            color: rgba(180,200,255,0.75);
            cursor: pointer;
            user-select: none;
        }
        .toggle-switch input { display: none; }
        .toggle-switch label {
            position: relative;
            display: inline-block;
            width: 44px; height: 22px;
            background: rgba(255,255,255,0.1);
            border-radius: 22px;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
            margin: 0;
            border: 1px solid rgba(0,150,255,0.25);
            flex-shrink: 0;
        }
        .toggle-switch label::after {
            content: "";
            position: absolute;
            width: 16px; height: 16px;
            left: 3px; top: 3px;
            background: rgba(180,200,255,0.6);
            border-radius: 50%;
            transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
        }
        .toggle-switch input:checked + label {
            background: rgba(0,100,255,0.35);
            border-color: rgba(0,190,255,0.7);
            box-shadow: 0 0 12px rgba(0,150,255,0.45);
        }
        .toggle-switch input:checked + label::after {
            transform: translateX(22px);
            background: #00bfff;
            box-shadow: 0 0 10px rgba(0,200,255,0.85);
        }

        .forgot-link {
            color: rgba(0,190,255,0.85);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s, text-shadow 0.2s;
            text-shadow: 0 0 8px rgba(0,150,255,0.3);
        }
        .forgot-link:hover {
            color: #00d4ff;
            text-shadow: 0 0 14px rgba(0,220,255,0.8);
        }

        /* Glowing submit button */
        .btn-submit {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 170px;
            padding: 13px 38px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #0066ff, #0044cc);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            overflow: hidden;
            transition: background 0.3s, box-shadow 0.3s, transform 0.2s;
            box-shadow:
                0 0 20px rgba(0,100,255,0.5),
                0 0 40px rgba(0,80,255,0.25),
                0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-submit::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
            border-radius: 10px;
            pointer-events: none;
        }
        .btn-submit::after {
            content: "";
            position: absolute;
            width: 60px; height: 100%;
            background: rgba(255,255,255,0.2);
            left: -80px; top: 0;
            transform: skewX(-20deg);
            transition: left 0.5s;
            pointer-events: none;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #0080ff, #0055ee);
            box-shadow:
                0 0 30px rgba(0,140,255,0.75),
                0 0 60px rgba(0,100,255,0.35),
                0 0 100px rgba(0,80,255,0.15),
                0 6px 20px rgba(0,0,0,0.5);
            transform: translateY(-3px) scale(1.03);
        }
        .btn-submit:hover::after { left: 130%; }
        .btn-submit:active { transform: translateY(1px) scale(0.98); }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,150,255,0.25), transparent);
            margin: 24px 0;
        }

        .links { font-size: 14px; color: rgba(180,200,255,0.55); }
        .links a {
            color: rgba(0,195,255,0.9);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            text-shadow: 0 0 8px rgba(0,180,255,0.3);
            transition: color 0.2s, text-shadow 0.2s;
        }
        .links a:hover {
            color: #00d4ff;
            text-shadow: 0 0 14px rgba(0,220,255,0.8);
        }

        /* Responsive */
        @media (min-width: 1024px) { .signin-form { padding: 50px 44px; } }
        @media (min-width: 768px) and (max-width: 1023px) { .signin-form { width: 380px; } }
        @media (max-width: 767px) {
            .signin-form { width: 90%; padding: 32px 20px; }
            .form-options { font-size: 12px; }
            .btn-submit { width: 100%; }
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="card-wrap" id="cardWrap">
    <div class="signin-form" id="signinCard">
        <div class="form-glow-ring"></div>

        <form method="POST" action="{% url 'signin' %}">
            {% csrf_token %}

            <div class="nova-logo">NOVA</div>
            <h2>Sign In</h2>

            <div class="input-wrap">
                <i class="ti ti-user input-icon" aria-hidden="true"></i>
                <input type="text" name="username" placeholder="Username" required autocomplete="username">
            </div>

            <div class="input-wrap">
                <i class="ti ti-lock input-icon" aria-hidden="true"></i>
                <input type="password" name="password" id="password" placeholder="Password" required autocomplete="current-password">
            </div>

            <div class="form-options">
                <div class="toggle-switch">
                    <input type="checkbox" id="showPass">
                    <label for="showPass"></label>
                    <span>Show Password</span>
                </div>
                <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot?</a>
            </div>

            <button type="submit" class="btn-submit">
                <i class="ti ti-login" aria-hidden="true"></i>
                Sign In
            </button>

            <div class="divider"></div>

            <div class="links">
                Don't have an account? <a href="{% url 'signup' %}">Signup</a>
            </div>
        </form>
    </div>
</div>

<script>
    /* ── Particle system ── */
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');
    let W, H, pts = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function newPt(randomY) {
        return {
            x:     Math.random() * W,
            y:     randomY ? Math.random() * H : H + 5,
            r:     Math.random() * 1.5 + 0.4,
            dx:    (Math.random() - 0.5) * 0.3,
            dy:    -(Math.random() * 0.5 + 0.15),
            alpha: Math.random() * 0.5 + 0.2,
            col:   Math.random() > 0.5 ? '0,160,255' : '120,50,255'
        };
    }

    for (var i = 0; i < 120; i++) pts.push(newPt(true));

    (function tick() {
        ctx.clearRect(0, 0, W, H);
        for (var p of pts) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle   = 'rgba(' + p.col + ',' + p.alpha + ')';
            ctx.shadowColor = 'rgba(' + p.col + ',0.9)';
            ctx.shadowBlur  = 7;
            ctx.fill();
            p.x += p.dx;
            p.y += p.dy;
            if (p.y < -5 || p.x < -5 || p.x > W + 5) Object.assign(p, newPt(false));
        }
        requestAnimationFrame(tick);
    })();

    /* ── 3D mouse tilt ── */
    var card = document.getElementById('signinCard');
    var wrap = document.getElementById('cardWrap');

    document.addEventListener('mousemove', function(e) {
        var r  = wrap.getBoundingClientRect();
        var mx = ((e.clientX - (r.left + r.width  / 2)) / r.width)  * 12;
        var my = ((e.clientY - (r.top  + r.height / 2)) / r.height) * 9;
        card.style.transform = 'rotateX(' + (-my) + 'deg) rotateY(' + mx + 'deg)';
        card.style.boxShadow =
            (-mx * 1.5) + 'px ' + my + 'px 60px rgba(0,100,255,0.3),' +
            '0 0 80px rgba(100,0,255,0.15),' +
            'inset 0 1px 0 rgba(255,255,255,0.09)';
    });

    document.addEventListener('mouseleave', function() {
        card.style.transform = '';
        card.style.boxShadow = '';
    });

    /* ── Show / hide password — original logic, unchanged ── */
    document.getElementById('showPass').addEventListener('change', function() {
        document.getElementById('password').type = this.checked ? 'text' : 'password';
    });
</script>
</body>
</html>
